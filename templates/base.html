{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>{% block title %}husnaincodes{% endblock title %}</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="{% static 'style.css' %}?v={% now 'timestamp' %}">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand" href="{% url 'Home' %}">husnaincodes <span style="color: red;">愛</span></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-center">
          <li class="nav-item">
            <a class="nav-link" href="{% url 'Home' %}">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'Projects' %}">Projects</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'About' %}">About</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'Contact' %}">Contact</a>
          </li>
          <li class="nav-item ms-3">
            <button id="theme-toggle" class="btn btn-outline-light btn-sm" title="Toggle dark mode">
              <i class="fas fa-moon"></i> Dark
            </button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  {% block body %}
  {% endblock body %}

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  
  <!-- Theme Toggle Script -->
  <script>
    // Initialize theme from localStorage
    function initTheme() {
      const savedTheme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
      updateThemeButton(savedTheme);
    }

    // Update button text and icon
    function updateThemeButton(theme) {
      const btn = document.getElementById('theme-toggle');
      if (btn) {
        if (theme === 'dark') {
          btn.innerHTML = '<i class="fas fa-sun"></i> Light';
          btn.classList.remove('btn-outline-light');
          btn.classList.add('btn-outline-warning');
        } else {
          btn.innerHTML = '<i class="fas fa-moon"></i> Dark';
          btn.classList.remove('btn-outline-warning');
          btn.classList.add('btn-outline-light');
        }
      }
    }

    // Toggle theme function
    function toggleTheme() {
      const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';
      
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      updateThemeButton(newTheme);
    }

    // Attach event listener to button
    document.addEventListener('DOMContentLoaded', function() {
      initTheme();
      const btn = document.getElementById('theme-toggle');
      if (btn) {
        btn.addEventListener('click', toggleTheme);
      }
    });
  </script>
</body>
</html>
